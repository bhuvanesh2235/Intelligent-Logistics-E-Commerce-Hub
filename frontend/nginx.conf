server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — always serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Spring Boot backend (all /api except ML routes)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Module 2 — LSTM Forecasting API
    location /api/v2/ {
        proxy_pass http://forecasting-api:5001/api/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Module 3 — CNN Damage Detection API
    location /api/v3/ {
        proxy_pass http://cnn-api:5002/api/v3/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}

