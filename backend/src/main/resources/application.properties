spring.application.name=logistics-hub

# ─── Database ────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/logistics_hub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# JWT_SECRET must be set as an environment variable (base64-encoded, 256-bit minimum).
# Generate one with: openssl rand -base64 32
# DO NOT provide a default value here — the app will refuse to start if this is unset.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ─── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.logistics.hub=DEBUG
logging.level.org.springframework.security=WARN
