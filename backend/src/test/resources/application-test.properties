# ─── Test-only overrides ─────────────────────────────────────────────────────
# This file is loaded ONLY by Spring Boot tests via @ActiveProfiles("test").
# It NEVER ships to production and contains no real secrets.

# Dummy base64 JWT secret (256-bit): safe for tests, NOT a production key.
app.jwt.secret=dGVzdC1vbmx5LWp3dC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktbm90LXByb2Q=
app.jwt.expiration-ms=3600000

# Use in-memory H2 for service/controller tests that need a datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
